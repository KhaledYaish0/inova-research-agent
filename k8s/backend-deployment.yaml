apiVersion: apps/v1
kind: Deployment
metadata:
  name: inova-backend
  namespace: inova
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inova-backend
  template:
    metadata:
      labels:
        app: inova-backend
    spec:
      containers:
        - name: inova-backend
          image: ghcr.io/amrqamhieh/inova-research-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: inova-config
                  key: OPENAI_MODEL
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: inova-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: inova-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inova-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: inova-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: inova-config
                  key: POSTGRES_PORT
            - name: DATABASE_URL
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inova-secrets
                  key: OPENAI_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inova-secrets
                  key: TAVILY_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"