apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inova-backend
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - inova
  selector:
    matchLabels:
      app: inova-backend
  endpoints:
    - port: http
      path: /metrics/
      interval: 15s
      scrapeTimeout: 10s
